<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MacroPlan - Goal Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#fa6c38",
            "background-light": "#f8f6f5",
            "background-dark": "#23150f",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    body {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    /* Custom style for radio button checkmark */
    .custom-radio:checked + label .checkmark {
      display: flex;
    }
    .custom-radio:checked + label {
      border-color: #fa6c38;
      box-shadow: 0 0 0 1px #fa6c38;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-screen w-full flex-col group/design-root overflow-hidden">
<!-- Main Content Area -->
<div class="flex flex-col flex-grow px-4 pt-4">
<!-- TopAppBar with PageIndicators -->
<div class="flex w-full items-center justify-between">
<button class="flex size-10 shrink-0 items-center justify-center text-[#1c110d] dark:text-gray-300">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<div class="flex flex-row items-center justify-center gap-2">
<div class="h-2 w-2 rounded-full bg-primary"></div>
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
</div>
<div class="size-10 shrink-0"></div> <!-- Spacer for balance -->
</div>
<!-- Headlines -->
<div class="mt-8">
<h1 class="text-[#1c110d] dark:text-white tracking-tight text-[32px] font-bold leading-tight">👋 Hey there!</h1>
<h3 class="mt-4 text-[#1c110d] dark:text-gray-300 tracking-tight text-2xl font-bold leading-tight">What's your main goal?</h3>
</div>
<!-- RadioList as Cards -->
<div class="flex flex-col gap-3 mt-8">
<div class="relative">
<input checked="" class="absolute opacity-0 h-0 w-0 custom-radio" id="goal-1" name="goal-selection" type="radio"/>
<label class="flex items-center gap-4 rounded-lg border border-solid border-[#e9d5ce] dark:border-gray-700 bg-white dark:bg-background-dark p-4 transition-all cursor-pointer" for="goal-1">
<p class="grow text-[#1c110d] dark:text-white text-base font-medium leading-normal">🔥 Lose Fat (Cut)</p>
<div class="checkmark hidden size-6 items-center justify-center rounded-full bg-primary text-white">
<span class="material-symbols-outlined text-base">check</span>
</div>
</label>
</div>
<div class="relative">
<input class="absolute opacity-0 h-0 w-0 custom-radio" id="goal-2" name="goal-selection" type="radio"/>
<label class="flex items-center gap-4 rounded-lg border border-solid border-[#e9d5ce] dark:border-gray-700 bg-white dark:bg-background-dark p-4 transition-all cursor-pointer" for="goal-2">
<p class="grow text-[#1c110d] dark:text-white text-base font-medium leading-normal">💪 Build Muscle (Bulk)</p>
<div class="checkmark hidden size-6 items-center justify-center rounded-full bg-primary text-white">
<span class="material-symbols-outlined text-base">check</span>
</div>
</label>
</div>
<div class="relative">
<input class="absolute opacity-0 h-0 w-0 custom-radio" id="goal-3" name="goal-selection" type="radio"/>
<label class="flex items-center gap-4 rounded-lg border border-solid border-[#e9d5ce] dark:border-gray-700 bg-white dark:bg-background-dark p-4 transition-all cursor-pointer" for="goal-3">
<p class="grow text-[#1c110d] dark:text-white text-base font-medium leading-normal">⚖️ Maintain Weight</p>
<div class="checkmark hidden size-6 items-center justify-center rounded-full bg-primary text-white">
<span class="material-symbols-outlined text-base">check</span>
</div>
</label>
</div>
<div class="relative">
<input class="absolute opacity-0 h-0 w-0 custom-radio" id="goal-4" name="goal-selection" type="radio"/>
<label class="flex items-center gap-4 rounded-lg border border-solid border-[#e9d5ce] dark:border-gray-700 bg-white dark:bg-background-dark p-4 transition-all cursor-pointer" for="goal-4">
<p class="grow text-[#1c110d] dark:text-white text-base font-medium leading-normal">🎯 Body Recomposition</p>
<div class="checkmark hidden size-6 items-center justify-center rounded-full bg-primary text-white">
<span class="material-symbols-outlined text-base">check</span>
</div>
</label>
</div>
</div>
</div>
<!-- Bottom Action Button -->
<div class="w-full p-4 pb-6 mt-auto">
<button class="h-12 w-full flex items-center justify-center rounded-lg bg-primary text-base font-bold text-white shadow-sm transition-opacity hover:opacity-90">
        Continue →
      </button>
</div>
</div>
</body></html>
