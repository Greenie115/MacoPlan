<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Generate Meal Plan</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#FF6B35",
            "protein": "#E63946",
            "carbs": "#457B9D",
            "fat": "#F4A261",
            "background": "#FFFFFF",
          },
          fontFamily: {
            "sans": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "1rem", // 16px
            "lg": "1.5rem", // 24px
            "xl": "2rem",
            "full": "9999px"
          },
          boxShadow: {
             "card": "0 2px 8px rgba(0,0,0,0.08)",
          }
        },
      },
    }
  </script>
<style>
    body {
      min-height: 100dvh;
      font-family: 'Inter', sans-serif;
    }
    .pill-button {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 1rem;
      height: 48px;
      border-radius: 9999px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease-in-out;
      flex-grow: 1;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gray-800 font-sans">
<div class="relative flex min-h-screen w-full flex-col bg-background overflow-hidden">
<div class="absolute inset-0 z-0 h-full w-full">
<img alt="A vibrant and healthy meal with salmon, avocado, and fresh greens, representing the app's focus on nutrition." class="h-full w-full object-cover blur-sm" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCcyZW7C8dh9S4ej8kz0m-Qfy9o1Q0mG3k-LQIe4sa1kn-r1pCohGaMIQJyoi3GqyvXdtUIwxHfJKxiaLj4H7NHHt1MpjABO670XOKyyI5J71C-5hHl8sghXFzf0FFrkQtATCQW1t_u1X2raX7vvbCpbrqmgBzikMF5h9yiY3P_fsQuYqmmfb4tNqIv07iRqCQSYC2wCZzsaUG_XsmWKqEi2yTQnzSaDADzzvI3fCDaC_rQqZsEEFU-wp-6OCYxi_8VmciHJtkOCw"/>
<div class="absolute inset-0 bg-black/30"></div>
</div>
<div class="relative flex h-full min-h-screen w-full flex-col items-center justify-end">
<div class="flex w-full max-w-lg flex-col rounded-t-lg bg-background shadow-2xl">
<div class="flex h-8 w-full items-center justify-center pt-4">
<div class="h-1.5 w-10 rounded-full bg-gray-300"></div>
</div>
<h3 class="font-sans text-gray-900 tracking-tight text-2xl font-semibold leading-tight px-4 text-center pb-2 pt-2">Generate Meal Plan</h3>
<div class="p-4 space-y-6">
<div>
<p class="font-sans text-gray-900 text-base font-normal leading-normal pb-3">Plan Duration</p>
<div class="flex space-x-2">
<button class="pill-button bg-gray-100 text-gray-700">1 Day</button>
<button class="pill-button bg-gray-100 text-gray-700">3 Days</button>
<button class="pill-button bg-primary text-white">7 Days ✓</button>
</div>
</div>
<div>
<p class="font-sans text-gray-900 text-base font-normal leading-normal pb-3">Meals Per Day</p>
<div class="flex space-x-2">
<button class="pill-button bg-gray-100 text-gray-700">3</button>
<button class="pill-button bg-primary text-white">4 ✓</button>
<button class="pill-button bg-gray-100 text-gray-700">5</button>
<button class="pill-button bg-gray-100 text-gray-700">6</button>
</div>
</div>
<div>
<div class="flex items-center justify-between">
<p class="font-sans text-gray-900 text-base font-normal leading-normal">Dietary Preferences</p>
<a class="font-sans text-sm font-semibold text-primary" href="#">Edit Preferences</a>
</div>
<p class="font-sans text-gray-600 text-sm leading-normal pt-1">✓ Vegetarian, Gluten-Free</p>
</div>
<div>
<p class="font-sans text-gray-900 text-base font-normal leading-normal pb-3">Target Macros (per day)</p>
<div class="grid grid-cols-4 gap-4">
<div class="flex flex-col items-center justify-center rounded-lg bg-protein/10 p-3 text-center">
<span class="text-2xl">🥩</span>
<span class="text-sm font-semibold text-protein">180g</span>
</div>
<div class="flex flex-col items-center justify-center rounded-lg bg-carbs/10 p-3 text-center">
<span class="text-2xl">🍚</span>
<span class="text-sm font-semibold text-carbs">280g</span>
</div>
<div class="flex flex-col items-center justify-center rounded-lg bg-fat/10 p-3 text-center">
<span class="text-2xl">🥑</span>
<span class="text-sm font-semibold text-fat">68g</span>
</div>
<div class="flex flex-col items-center justify-center rounded-lg bg-gray-100 p-3 text-center">
<span class="text-sm font-semibold text-gray-900">2,450</span>
<span class="text-xs font-normal text-gray-500">cal total</span>
</div>
</div>
</div>
<hr class="border-gray-200"/>
<div class="flex flex-col gap-3 pt-1 pb-2">
<p class="font-sans text-center text-sm text-gray-500">Free Plan: 1 of 3 plans remaining</p>
<button class="flex h-14 w-full items-center justify-center rounded-full bg-primary font-sans text-base font-semibold text-white shadow-lg transition-transform active:scale-95">Generate in 3 Seconds ⚡</button>
<button class="flex h-14 w-full items-center justify-center rounded-full bg-transparent font-sans text-base font-semibold text-gray-500 transition-colors hover:bg-gray-100">Cancel</button>
</div>
</div>
</div>
</div>
</div>

</body></html>
