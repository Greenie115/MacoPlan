<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Meal Plans</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ff6933",
              "background-light": "#f8f6f5",
              "background-dark": "#23140f",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display">
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<!-- Top App Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between shrink-0">
<div class="flex size-12 shrink-0 items-center justify-start text-[#1d110c] dark:text-background-light">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<h2 class="flex-1 text-lg font-bold leading-tight tracking-[-0.015em] text-center text-[#1d110c] dark:text-background-light">My Meal Plans</h2>
<div class="flex size-12 shrink-0 items-center"></div>
</div>
<!-- Main Content (Empty State) -->
<main class="flex flex-1 flex-col items-center justify-center p-4">
<div class="flex flex-col items-center gap-6 text-center w-full max-w-sm">
<img class="bg-center bg-no-repeat aspect-square bg-cover rounded-xl w-full max-w-[280px] grayscale" data-alt="A simple, stylized illustration of a plate with a fork and knife, representing meal planning." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCazcXAMA9w8tQLDiVsSU1MWQOsEJcZsC_E6PaGJJghrW74XNk4a3pmcz7UVqCh2BEYe-MYwHnLer4C5-EUGW4ueXjUZcx2KNCKTrXadbhYTTMMr4oncDF8Nvdhba4SxgZEgIPx3bboWwAQGY1MMKBZry7g9Cjs9t495fPVqqzetSgZk1I2UFOTeqV1bhP7fv9hY3z24W1hN4ogcXmZxKlm4lkH9IbHctumInre_eH0aMs0XwlgOxS1nB0ehI61fZrHvXhw5seuMQ"/>
<div class="flex flex-col items-center gap-2">
<p class="text-[#1d110c] dark:text-background-light text-xl font-semibold leading-tight tracking-[-0.015em]">You haven't generated any meal plans yet</p>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal">Create your first plan in 3 seconds</p>
</div>
</div>
</main>
<!-- Floating Action Button at the bottom -->
<div class="flex px-4 py-3 bg-background-light dark:bg-background-dark shrink-0">
<button class="flex min-w-[84px] w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-12 px-5 flex-1 bg-primary text-white gap-2 text-base font-bold leading-normal tracking-[0.015em]">
<span class="truncate">Generate Now</span>
<span class="material-symbols-outlined text-2xl">arrow_forward</span>
</button>
</div>
<!-- Bottom Navigation Bar -->
<div class="flex gap-2 border-t border-[#f4eae6] dark:border-background-dark/20 bg-background-light dark:bg-background-dark px-4 pb-3 pt-2 shrink-0">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined flex h-8 items-center justify-center text-2xl">home</span>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 rounded-full text-[#1d110c] dark:text-white" href="#">
<span class="material-symbols-outlined fill flex h-8 items-center justify-center text-2xl">list_alt</span>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Meals</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined flex h-8 items-center justify-center text-2xl">shopping_cart</span>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Groceries</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 dark:text-slate-400" href="#">
<span class="material-symbols-outlined flex h-8 items-center justify-center text-2xl">person</span>
<p class="text-xs font-medium leading-normal tracking-[0.015em]">Profile</p>
</a>
</div>
</div>
</body></html>
