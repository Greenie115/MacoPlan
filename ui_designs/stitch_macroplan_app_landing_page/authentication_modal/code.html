<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<title>MacroPlan - Create Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    borderRadius: {

            font-variation-settings:
                'FILL' 0,

                'GRAD' 0,
                'opsz' 24

      min-height: max(884px, 100dvh);

<body class="font-display">
<div class="relative flex min-h-screen w-full items-center justify-center bg-background-light dark:bg-background-dark p-4">
<!-- Backdrop -->
<div class="absolute inset-0 bg-black/60"></div>
<!-- This is a background image for context. The modal will appear on top of it. -->
<img class="absolute inset-0 h-full w-full object-cover" data-alt="A person weightlifting in a gym, representing the app's target audience" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCaqWtGRIQB4Is--VrC5Cge1ZeplNJqEU1VEhuwGNJwHAIs88bRwTMg5hziNbQjmEz-a3tMYUwOdBuy9-LnMNLYIZBWpuid9oN9Er5bxR9YM3DlGnJ6EDN7WDSmNbh3KGAHFSD4dFlB3L9rTIx5GwM3pLvBQKNNTL0Fki2iqSVC2-9ryncpWqWuI_4MlRr_-evU49WuN50Nu9qWrRzzZTqw3UjHHj0CKMHYp4d9Gj8Ej2epnSD4thiqe8ueWjtvlAZunEmMXI7khQ"/>
<!-- Modal Container -->
<div class="relative w-full max-w-sm rounded-xl bg-background-light dark:bg-background-dark p-6 shadow-2xl sm:p-8">
<!-- Toolbar / Close Button -->
<div class="absolute top-0 right-0 pt-4 pr-4">
<button class="flex h-8 w-8 items-center justify-center rounded-full bg-background-light text-gray-500 hover:bg-gray-200 dark:bg-background-dark dark:text-gray-400 dark:hover:bg-gray-700">
<span class="material-symbols-outlined text-lg">close</span>
</button>
</div>
<div class="flex flex-col space-y-4">
<!-- Headline Text -->
<h3 class="text-center font-display text-2xl font-bold tracking-tight text-gray-900 dark:text-white">Welcome to MacroPlan</h3>
<!-- Body Text -->
<p class="text-center font-display text-base font-normal text-gray-600 dark:text-gray-400">Create your free account</p>
<!-- Social Login Button -->
<div class="py-2">
<button class="flex h-12 w-full cursor-pointer items-center justify-center gap-3 overflow-hidden rounded-lg border border-gray-300 bg-white px-4 text-sm font-medium text-gray-800 hover:bg-gray-50 dark:border-gray-600 dark:bg-background-dark dark:text-white dark:hover:bg-gray-800">

<span class="truncate">Sign up with Google</span>
</button>
</div>
<!-- Divider -->
<div class="relative py-2">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-gray-300 dark:border-gray-700"></div>
</div>
<div class="relative flex justify-center">
<span class="bg-background-light px-2 text-sm text-gray-500 dark:bg-background-dark dark:text-gray-400">or</span>
</div>
</div>
<!-- Form -->
<form class="flex flex-col space-y-4">
<!-- Email Input -->
<div>
<label class="sr-only" for="email">Email Address</label>
<input class="h-12 w-full rounded-lg border border-gray-300 bg-white px-4 text-gray-900 placeholder-gray-500 focus:border-primary focus:ring-primary dark:border-gray-600 dark:bg-background-dark dark:text-white dark:placeholder-gray-400" id="email" name="email" placeholder="your@email.com" required="" type="email"/>
</div>
<!-- Password Input -->
<div>
<label class="sr-only" for="password">Password</label>
<input class="h-12 w-full rounded-lg border border-gray-300 bg-white px-4 text-gray-900 placeholder-gray-500 focus:border-primary focus:ring-primary dark:border-gray-600 dark:bg-background-dark dark:text-white dark:placeholder-gray-400" id="password" name="password" placeholder="Password" required="" type="password"/>
</div>
<!-- Checkbox -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-gray-300 text-primary focus:ring-primary dark:border-gray-600 dark:bg-gray-700" id="terms" name="terms" type="checkbox"/>
<label class="ml-2 block text-sm text-gray-700 dark:text-gray-300" for="terms">I agree to <a class="font-medium text-primary hover:underline" href="#">Terms &amp; Privacy</a></label>
</div>
<!-- Primary CTA Button -->
<button class="flex h-12 w-full items-center justify-center gap-2 rounded-lg bg-primary px-6 text-base font-bold text-white shadow-sm hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-background-dark" type="submit">
                        Create Account
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Footer Links -->
<div class="flex flex-col items-center space-y-4 pt-2">
<p class="text-sm text-gray-600 dark:text-gray-400">
                        Already have an account?
                        <a class="font-medium text-primary hover:underline" href="#">Login</a>
</p>
<button class="h-10 rounded-lg px-4 text-sm font-medium text-gray-600 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-white/10">Skip - Continue as Guest</button>
</div>
</div>
</div>
</div>
</body></html>
